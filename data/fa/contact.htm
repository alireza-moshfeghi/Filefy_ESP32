<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Vazirmatn', system-ui, -apple-system, 'Roboto', Tahoma, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: linear-gradient(135deg, #1e2a3a 0%, #0f1724 100%);
            transition: background 0.2s ease;
        }

        .admin-container {
            max-width: 540px;
            width: 100%;
            background: rgba(20, 28, 38, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        .box-section {
            padding: 2rem 2rem 0rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #cfddee);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .admin-section {
            padding: 1rem 1rem 2rem 2rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.2s ease;
        }

        .contact-item:last-child {
            border-bottom: none;
        }

        .contact-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            flex-shrink: 0;
        }

        .contact-icon svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
        }

        .contact-icon svg path {
            fill: currentColor;
            stroke: none;
        }

        .contact-text {
            flex: 1;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.85);
            word-wrap: break-word;
            text-align: right;
            direction: rtl;
        }

        .contact-link {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.85);
            transition: opacity 0.2s;
        }

        .contact-link:hover {
            opacity: 0.7;
            text-decoration: underline;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .admin-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.85rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            border: none;
            border-radius: 3rem;
            cursor: pointer;
            background: #4f46e5;
            color: white;
            transition: opacity 0.15s;
        }

        .admin-btn:hover {
            opacity: 0.85;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loading.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(20, 28, 38, 0.95);
            padding: 20px 32px;
            border-radius: 2rem;
            font-family: inherit;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }

            .box-section {
                padding: 1.5rem 1.5rem 0rem 1.5rem;
            }

            .admin-title {
                font-size: 1.5rem;
            }

            .admin-section {
                padding: 0rem 1rem 1.8rem 1.5rem;
            }

            .contact-item {
                padding: 0.5rem 0.5rem;
                gap: 0.75rem;
            }

            .contact-icon {
                width: 32px;
                height: 32px;
            }

            .contact-text {
                font-size: 1.1rem;
            }

            .admin-btn {
                padding: 0.7rem 1.5rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div id="loading">
        <div class="loader-content">
            <div class="spinner"></div>
            <span>...در حال بارگزاری</span>
        </div>
    </div>

    <div class="admin-container">
        <div class="box-section">
            <div class="admin-title header-title" style="color: #333;">تماس با ما</div>
        </div>
        <div class="admin-section">
            <div class="contact-item">

                </div>
                <div class="contact-text">
                    <a href="#" id="phone" class="contact-link" style="color: #333;"></a>
                </div>
            </div>
            <div class="contact-item">
                <div class="contact-icon">
                    <svg viewBox="0 0 512 512">
                        <path d="M48 64c-26.5 0-48 21.5-48 48 0 15.1 7.1 29.3 19.2 38.4l208 156c17.1 12.8 40.5 12.8 57.6 0l208-156c12.1-9.1 19.2-23.3 19.2-38.4 0-26.5-21.5-48-48-48L48 64zM0 196L0 384c0 35.3 28.7 64 64 64l384 0c35.3 0 64-28.7 64-64l0-188-198.4 148.8c-34.1 25.6-81.1 25.6-115.2 0L0 196z"/>
                    </svg>
                </div>
                <div class="contact-text">
                    <a href="#" id="email" class="contact-link" style="color: #333;"></a>
                </div>
            </div>
            <div class="contact-item">
                <div class="contact-icon">
                    <svg viewBox="0 0 448 512">
                        <path d="M194.4 211.7a53.3 53.3 0 1 0 59.2 88.6 53.3 53.3 0 1 0 -59.2-88.6zm142.3-68.4c-5.2-5.2-11.5-9.3-18.4-12-18.1-7.1-57.6-6.8-83.1-6.5-4.1 0-7.9 .1-11.2 .1s-7.2 0-11.4-.1c-25.5-.3-64.8-.7-82.9 6.5-6.9 2.7-13.1 6.8-18.4 12s-9.3 11.5-12 18.4c-7.1 18.1-6.7 57.7-6.5 83.2 0 4.1 .1 7.9 .1 11.1s0 7-.1 11.1c-.2 25.5-.6 65.1 6.5 83.2 2.7 6.9 6.8 13.1 12 18.4s11.5 9.3 18.4 12c18.1 7.1 57.6 6.8 83.1 6.5 4.1 0 7.9-.1 11.2-.1s7.2 0 11.4 .1c25.5 .3 64.8 .7 82.9-6.5 6.9-2.7 13.1-6.8 18.4-12s9.3-11.5 12-18.4c7.2-18 6.8-57.4 6.5-83 0-4.2-.1-8.1-.1-11.4s0-7.1 .1-11.4c.3-25.5 .7-64.9-6.5-83-2.7-6.9-6.8-13.1-12-18.4l0 .2zm-67.1 44.5c18.1 12.1 30.6 30.9 34.9 52.2s-.2 43.5-12.3 61.6c-6 9-13.7 16.6-22.6 22.6s-19 10.1-29.6 12.2c-21.3 4.2-43.5-.2-61.6-12.3s-30.6-30.9-34.9-52.2 .2-43.5 12.2-61.6 30.9-30.6 52.2-34.9 43.5 .2 61.6 12.2l.1 0zm29.2-1.3c-3.1-2.1-5.6-5.1-7.1-8.6s-1.8-7.3-1.1-11.1 2.6-7.1 5.2-9.8 6.1-4.5 9.8-5.2 7.6-.4 11.1 1.1 6.5 3.9 8.6 7 3.2 6.8 3.2 10.6c0 2.5-.5 5-1.4 7.3s-2.4 4.4-4.1 6.2-3.9 3.2-6.2 4.2-4.8 1.5-7.3 1.5c-3.8 0-7.5-1.1-10.6-3.2l-.1 0zM448 96c0-35.3-28.7-64-64-64L64 32C28.7 32 0 60.7 0 96L0 416c0 35.3 28.7 64 64 64l320 0c35.3 0 64-28.7 64-64l0-320zM357 389c-18.7 18.7-41.4 24.6-67 25.9-26.4 1.5-105.6 1.5-132 0-25.6-1.3-48.3-7.2-67-25.9s-24.6-41.4-25.8-67c-1.5-26.4-1.5-105.6 0-132 1.3-25.6 7.1-48.3 25.8-67s41.5-24.6 67-25.8c26.4-1.5 105.6-1.5 132 0 25.6 1.3 48.3 7.1 67 25.8s24.6 41.4 25.8 67c1.5 26.3 1.5 105.4 0 131.9-1.3 25.6-7.1 48.3-25.8 67l0 .1z"/>
                    </svg>
                </div>
                <div class="contact-text">
                    <a href="#" id="instagram" target="_blank" class="contact-link" style="color: #333;"></a>
                </div>
            </div>
            <div class="contact-item">
                <div class="contact-icon">
                    <svg viewBox="0 0 512 512">
                        <path d="M256 8a248 248 0 1 0 0 496 248 248 0 1 0 0-496zM371 176.7c-3.7 39.2-19.9 134.4-28.1 178.3-3.5 18.6-10.3 24.8-16.9 25.4-14.4 1.3-25.3-9.5-39.3-18.7-21.8-14.3-34.2-23.2-55.3-37.2-24.5-16.1-8.6-25 5.3-39.5 3.7-3.8 67.1-61.5 68.3-66.7 .2-.7 .3-3.1-1.2-4.4s-3.6-.8-5.1-.5c-2.2 .5-37.1 23.5-104.6 69.1-9.9 6.8-18.9 10.1-26.9 9.9-8.9-.2-25.9-5-38.6-9.1-15.5-5-27.9-7.7-26.8-16.3 .6-4.5 6.7-9 18.4-13.7 72.3-31.5 120.5-52.3 144.6-62.3 68.9-28.6 83.2-33.6 92.5-33.8 2.1 0 6.6 .5 9.6 2.9 2 1.7 3.2 4.1 3.5 6.7 .5 3.2 .6 6.5 .4 9.8z"/>
                    </svg>
                </div>
                <div class="contact-text">
                    <a href="#" id="telegram" target="_blank" class="contact-link" style="color: #333;"></a>
                </div>
            </div>

            <div class="btn-group">
                <a href="/fa/upload/" class="admin-btn action-btn">بازگشت به منو</a>
            </div>
        </div>
    </div>

    <script>
        function toPersianDigits(str) {
            if (!str) return '';
            const persianDigits = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
            return str.toString().replace(/[0-9]/g, function(w) {
                return persianDigits[+w];
            });
        }

        fetch('/fa/contact/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            }
        })
            .then(response => response.json())
            .then(data => {
                if (data.name) {
                    document.title = data.name + " | تماس با ما";
                }

                if (data.address) {
                    document.querySelector("#address").textContent = toPersianDigits(data.address);
                }
                if (data.phone) {
                    document.querySelector("#phone").textContent = toPersianDigits(data.phone);
                    document.querySelector("#phone").setAttribute("href", "tel:" + data.phone.replace(/-/g, "").replace(/_/g, ""));
                }
                if (data.email) {
                    document.querySelector("#email").textContent = data.email;
                    document.querySelector("#email").setAttribute("href", "mailto:" + data.email);
                }
                if (data.instagram) {
                    document.querySelector("#instagram").textContent = data.instagram;
                    document.querySelector("#instagram").setAttribute("href", data.instagram);
                }
                if (data.telegram) {
                    document.querySelector("#telegram").textContent = data.telegram;
                    document.querySelector("#telegram").setAttribute("href", data.telegram);
                }

                if (data.pricolor && data.seccolor) {
                    document.body.style.background = `linear-gradient(135deg, ${data.pricolor} 0%, ${data.seccolor} 100%)`;
                    document.querySelector('.admin-btn').style.backgroundColor = data.pricolor;
                }

                if (data.bgcolor) {
                    let container = document.querySelector('.admin-container');
                    if (container) {
                        container.style.backgroundColor = data.bgcolor;
                        container.style.backdropFilter = 'none';
                    }
                }

                if (data.navcolor) {
                    let meta = document.createElement('meta');
                    meta.name = "theme-color";
                    meta.content = data.navcolor;
                    document.head.appendChild(meta);
                }

                if (data.fgcolor) {
                    document.querySelector('.admin-btn').style.color = data.fgcolor;
                }


                setTimeout(hideLoading, 500);
            })
            .catch(error => {
                console.error('خطا در دریافت اطلاعات:', error);
                setTimeout(hideLoading, 500);
            });

        function hideLoading() {
            const loadingEl = document.getElementById('loading');
            if (loadingEl) {
                loadingEl.classList.add('fade-out');
            }
        }
    </script>
</body>

</html>
