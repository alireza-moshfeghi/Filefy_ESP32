<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Vazirmatn', system-ui, -apple-system, 'Roboto', Tahoma, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: linear-gradient(135deg, #1e2a3a 0%, #0f1724 100%);
            transition: background 0.2s ease;
        }

        .admin-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #333 !important;
            background: linear-gradient(135deg, #FFFFFF, #cfddee);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.9rem;
        }

        .box-section {
            padding: 2rem 2rem 1rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-container {
            max-width: 440px;
            width: 100%;
            background: rgba(20, 28, 38, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        .admin-section {
            padding: 0.3rem 2rem 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .admin-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.9rem 0;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            border: none;
            border-radius: 3rem;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transition: opacity 0.15s, transform 0.05s;
            letter-spacing: 0.5px;
        }

        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }

            .box-section {
                padding: 1.5rem 1.5rem 0.8rem 1.5rem;
            }

            .admin-title {
                font-size: 1.6rem;
            }

            .admin-section {
                padding: 0.3rem 1.5rem 2rem 1.5rem;
                gap: 0.85rem;
            }

            .admin-btn {
                padding: 0.75rem 0;
                font-size: 1.1rem;
            }
        }

        @media (max-width: 380px) {
            .admin-title {
                font-size: 1.5rem;
            }

            .admin-btn {
                font-size: 1rem;
                padding: 0.7rem 0;
            }
        }
    </style>
</head>

<body>

    <div class="admin-container">
        <div class="box-section">
            <div class="admin-title">پنل مدیریت</div>
        </div>
        <div class="admin-section">
            <a id="modules" href="/fa/files/" class="admin-btn"><span>مدیریت فایل ها 📁</span></a>
            <a id="modules" href="/fa/modules/" class="admin-btn"><span>تنظیمات ماژول ⚙️</span></a>
            <a id="settings" href="/fa/settings/" class="admin-btn"><span>تنظیمات ظاهری 🎨</span></a>
            <a id="account" href="/fa/account/" class="admin-btn"><span>تنظیمات اکانت 👤</span></a>
            <a id="logout" href="/fa/logout/" class="admin-btn"><span>خروج 🚪</span></a>
        </div>
    </div>

    <script>

        const cookie = document.cookie;
        const tokenCookie = cookie.split('; ').find(row => row.startsWith('token='));
        if (tokenCookie) {
            let token = tokenCookie.split('=')[1];
            const formData = new URLSearchParams();
            formData.append('token', token);

            fetch('/fa/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status == "user") {
                        document.getElementById("modules").style.display = "none";
                        document.getElementById("settings").style.display = "none";
                        document.getElementById("account").style.display = "none";
                    }
                    else if (data.status == "invalid") {
                        window.location.href = '/fa/login/';
                    }
                })
                .catch(error => {
                    console.log("خطا در بررسی وضعیت کاربر:", error);
                });
        }

        try {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/fa/home/', false);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            xhr.send(null);

            if (xhr.status === 200) {
                const data = JSON.parse(xhr.responseText);

                if (data.name) {
                    document.title = data.name + " | پنل مدیریت";
                }

                if (data.pricolor && data.seccolor) {
                    document.body.style.background = `linear-gradient(135deg, ${data.pricolor} 0%, ${data.seccolor} 100%)`;
                }

                if (data.pricolor) {
                    const btns = document.querySelectorAll('.admin-btn');
                    btns.forEach(btn => {
                        btn.style.backgroundColor = data.pricolor;
                        btn.style.color = '#ffffff';
                        btn.style.background = data.pricolor;
                    });
                }

                if (data.bgcolor) {
                    const card = document.querySelector('.admin-container');
                    card.style.backgroundColor = data.bgcolor;
                    card.style.backdropFilter = 'none';
                }

                if (data.navcolor) {
                    let meta = document.createElement('meta');
                    meta.name = "theme-color";
                    meta.content = data.navcolor;
                    document.head.appendChild(meta);
                }
            }
        } catch (error) {
            console.log("خطا در دریافت تنظیمات از API:", error);
        }

    </script>
</body>

</html>
