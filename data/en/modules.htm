<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', Tahoma, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: linear-gradient(135deg, #1e2a3a 0%, #0f1724 100%);
            transition: background 0.2s ease;
        }

        .admin-container {
            max-width: 560px;
            width: 100%;
            background: rgba(20, 28, 38, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        .box-section {
            padding: 2rem 2rem 1rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #cfddee);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .admin-subtitle {
            font-size: 0.85rem;
            opacity: 0.8;
            color: rgba(255, 255, 255, 0.8);
        }

        .admin-section {
            padding: 1.5rem 2rem 2rem 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            text-align: left;
            color: #e0e0e0;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.85rem 1rem;
            background: #f5f7fa;
            border: 2px solid #d1d5db;
            border-radius: 1rem;
            font-size: 0.95rem;
            font-family: inherit;
            color: #1f2937;
            direction: ltr;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4f46e5;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }

        .form-group input:disabled,
        .form-group select:disabled {
            background-color: #e5e7eb;
            color: #6b7280;
            cursor: not-allowed;
            border-color: #d1d5db;
        }

        .radio-group {
            display: flex;
            gap: 1.5rem;
            justify-content: flex-start;
            margin-top: 0.5rem;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: #e0e0e0;
        }

        .radio-option input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #4f46e5;
        }

        .manual-settings {
            display: none;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            margin-top: 0.5rem;
        }

        .manual-settings.show {
            display: block;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .admin-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            flex: 1;
            padding: 0.9rem 0;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            border: none;
            border-radius: 3rem;
            cursor: pointer;
            color: white;
            transition: opacity 0.15s;
        }

        .save-btn {
            background: #4f46e5;
        }

        .cancel-btn {
            background: #6b7280;
        }

        .admin-btn:hover {
            opacity: 0.85;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loading.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(20, 28, 38, 0.95);
            padding: 20px 32px;
            border-radius: 2rem;
            font-family: inherit;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }

            .box-section {
                padding: 1.5rem 1.5rem 0.8rem 1.5rem;
            }

            .admin-title {
                font-size: 1.6rem;
            }

            .admin-section {
                padding: 1.2rem 1.5rem 1.8rem 1.5rem;
            }

            .radio-group {
                flex-direction: column;
                gap: 0.75rem;
            }

            .btn-group {
                flex-direction: column;
                gap: 0.75rem;
            }

            .admin-btn {
                padding: 0.75rem 0;
            }
        }
    </style>
</head>

<body>
    <div id="loading">
        <div class="loader-content">
            <div class="spinner"></div>
            <span>Loading...</span>
        </div>
    </div>

    <div class="admin-container" id="settingsContainer">
        <div class="box-section">
            <div class="admin-title header-title" style="color: #333;">Module Settings</div>
            <div class="admin-subtitle" style="color: gray;">Network and device connection configuration</div>
        </div>
        <div class="admin-section">
            <form onsubmit="saveSettings(event)" id="settingsForm">
                <div class="form-group">
                    <label style="color: #333;">Access Point:</label>
                    <input type="text" id="ap" placeholder="Enter access point name">
                </div>
                <div class="form-group">
                    <label style="color: #333;">Number of Users:</label>
                    <select id="maxcon">
                        <option value="1">1 user</option>
                        <option value="2">2 users</option>
                        <option value="3">3 users</option>
                        <option value="4">4 users</option>
                        <option value="5">5 users</option>
                        <option value="6">6 users</option>
                        <option value="7">7 users</option>
                        <option value="8">8 users</option>
                    </select>
                </div>
                <div class="form-group">
                    <label style="color: #333;">Host:</label>
                    <input type="text" id="host" placeholder="Enter host address">
                </div>
                <div class="form-group">
                    <label style="color: #333;">Network Name (SSID):</label>
                    <input type="text" id="ssid" placeholder="Enter network name">
                </div>
                <div class="form-group">
                    <label style="color: #333;">Network Password:</label>
                    <input type="text" id="key" placeholder="Enter password">
                </div>
                <div class="form-group">
                    <label style="color: #333;">Network Settings Type:</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="networkType" value="dhcp" checked onchange="toggleNetworkType()">
                            <span style="color: #333;">Automatic</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="networkType" value="manual" onchange="toggleNetworkType()">
                            <span style="color: #333;">Manual</span>
                        </label>
                    </div>
                </div>
                <div class="manual-settings" id="manualSettings">
                    <div class="form-group">
                        <label style="color: #333;">IP:</label>
                        <input type="text" id="ip" placeholder="192.168.1.100" disabled>
                    </div>
                    <div class="form-group">
                        <label style="color: #333;">Subnet:</label>
                        <input type="text" id="subnet" placeholder="255.255.255.0" disabled>
                    </div>
                    <div class="form-group">
                        <label style="color: #333;">Gateway:</label>
                        <input type="text" id="gateway" placeholder="192.168.1.1" disabled>
                    </div>
                    <div class="form-group">
                        <label style="color: #333;">DNS:</label>
                        <input type="text" id="dns" placeholder="8.8.8.8" disabled>
                    </div>
                </div>
                <div class="btn-group">
                    <button type="submit" class="admin-btn save-btn">Save Settings</button>
                    <button type="button" class="admin-btn cancel-btn" onclick="window.location.href='/en/home/'">Back</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        var cookie = document.cookie;
        var token = cookie.split('; ').find(row => row.startsWith('token='));
        if (token) {
            token = token.split('=')[1];
            var formData = new URLSearchParams();
            formData.append('token', token);
            fetch('/en/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status == "invalid" || data.status == "user") {
                        window.location.href = '/en/login/';
                    }
                });
        }
        else {
            window.location.href = '/en/login/';
        }

        let currentSettings = {
            ap: '',
            maxcon: 1,
            host: '',
            ssid: '',
            key: '',
            networkType: 'dhcp',
            ip: '',
            subnet: '',
            gateway: '',
            dns: ''
        };

        function getToken() {
            var cookie = document.cookie;
            var token = cookie.split('; ').find(row => row.startsWith('token='));
            if (token) {
                return token.split('=')[1];
            }
            return null;
        }

        function toggleNetworkType() {
            const networkType = document.querySelector('input[name="networkType"]:checked').value;
            const manualSettings = document.getElementById('manualSettings');
            const ipInput = document.getElementById('ip');
            const subnetInput = document.getElementById('subnet');
            const gatewayInput = document.getElementById('gateway');
            const dnsInput = document.getElementById('dns');
            if (networkType === 'manual') {
                manualSettings.classList.add('show');
                ipInput.disabled = false;
                subnetInput.disabled = false;
                gatewayInput.disabled = false;
                dnsInput.disabled = false;
            } else {
                manualSettings.classList.remove('show');
                ipInput.disabled = true;
                subnetInput.disabled = true;
                gatewayInput.disabled = true;
                dnsInput.disabled = true;
            }
        }

        function hideLoading() {
            document.getElementById('loading').classList.add('fade-out');
        }

        var token = getToken();
        if (token) {
            var formData = new URLSearchParams();
            formData.append('token', token);
            fetch('/en/modules/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData.toString()
            })
                .then(response => response.json())
                .then(data => {
                    currentSettings = {
                        ap: data.ap || '',
                        maxcon: data.maxcon || 1,
                        host: data.host || '',
                        ssid: data.ssid || '',
                        key: data.key || '',
                        networkType: data.networkType || 'dhcp',
                        ip: data.ip || '',
                        subnet: data.subnet || '',
                        gateway: data.gateway || '',
                        dns: data.dns || ''
                    };
                    document.getElementById('ap').value = currentSettings.ap;
                    document.getElementById('maxcon').value = currentSettings.maxcon;
                    document.getElementById('host').value = currentSettings.host;
                    document.getElementById('ssid').value = currentSettings.ssid;
                    document.getElementById('key').value = currentSettings.key;
                    document.getElementById('ip').value = currentSettings.ip;
                    document.getElementById('subnet').value = currentSettings.subnet;
                    document.getElementById('gateway').value = currentSettings.gateway;
                    document.getElementById('dns').value = currentSettings.dns;
                    const networkTypeRadios = document.querySelectorAll('input[name="networkType"]');
                    networkTypeRadios.forEach(radio => {
                        if (radio.value === currentSettings.networkType) {
                            radio.checked = true;
                        }
                    });
                    toggleNetworkType();

                    if (data.pricolor && data.seccolor) {
                        document.body.style.background = `linear-gradient(135deg, ${data.pricolor} 0%, ${data.seccolor} 100%)`;
                        document.querySelectorAll('.save-btn, .cancel-btn').forEach(btn => {
                            btn.style.backgroundColor = data.pricolor;
                        });
                    }

                    if (data.bgcolor) {
                        let container = document.querySelector('.admin-container');
                        if (container) {
                            container.style.backgroundColor = data.bgcolor;
                            container.style.backdropFilter = 'none';
                        }
                        document.querySelector('.manual-settings').style.backgroundColor = data.bgcolor;
                    }

                    if (data.navcolor) {
                        let meta = document.createElement('meta');
                        meta.name = "theme-color";
                        meta.content = data.navcolor;
                        document.head.appendChild(meta);
                    }

                    if (data.fgcolor) {
                        document.querySelectorAll('.admin-btn').forEach(btn => {
                            btn.style.color = data.fgcolor;
                        });
                    }

                    if (data.name) {
                        document.title = data.name + " | Module Settings";
                    }

                    setTimeout(hideLoading, 500);
                })
                .catch(error => {
                    console.log('Error fetching settings:', error);
                    setTimeout(hideLoading, 500);
                });
        }

        function saveSettings(event) {
            event.preventDefault();
            const ap = document.getElementById('ap').value.trim();
            const maxcon = document.getElementById('maxcon').value;
            const host = document.getElementById('host').value.trim();
            const ssid = document.getElementById('ssid').value.trim();
            const key = document.getElementById('key').value;
            const networkType = document.querySelector('input[name="networkType"]:checked').value;
            const ip = document.getElementById('ip').value.trim();
            const subnet = document.getElementById('subnet').value.trim();
            const gateway = document.getElementById('gateway').value.trim();
            const dns = document.getElementById('dns').value.trim();

            var token = getToken();
            var formData = new URLSearchParams();
            formData.append('token', token);
            formData.append('action', 'set');
            formData.append('ap', ap);
            formData.append('maxcon', maxcon);
            formData.append('host', host);
            formData.append('ssid', ssid);
            formData.append('key', key);
            formData.append('networkType', networkType);
            formData.append('ip', ip);
            formData.append('subnet', subnet);
            formData.append('gateway', gateway);
            formData.append('dns', dns);

            fetch('/en/modules/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData.toString()
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status == "ap") {
                        alert("Please enter the access point.");
                    }
                    else if (data.status == "maxcon") {
                        alert("Please enter the number of users.");
                    }
                    else if (data.status == "host") {
                        alert("Please enter the host.");
                    }
                    else if (data.status == "networkType") {
                        alert("Please select the network settings type.");
                    }
                    else if (data.status == "ip") {
                        alert("Please enter the IP address.");
                    }
                    else if (data.status == "gateway") {
                        alert("Please enter the Gateway.");
                    }
                    else if (data.status == "subnet") {
                        alert("Please enter the Subnet mask.");
                    }
                    else if (data.status == "dns") {
                        alert("Please enter the DNS.");
                    }
                    else if (data.status == "ok") {
                        alert("Settings saved successfully.");
                        if (data.navcolor) {
                            document.querySelectorAll('.save-btn, .cancel-btn').forEach(btn => {
                                btn.style.backgroundColor = data.navcolor;
                            });
                            let metaThemeColor = document.querySelector('meta[name="theme-color"]');
                            if (!metaThemeColor) {
                                metaThemeColor = document.createElement('meta');
                                metaThemeColor.name = "theme-color";
                                document.head.appendChild(metaThemeColor);
                            }
                            metaThemeColor.content = data.navcolor;
                        }
                    }
                    else if (data.status == "error") {
                        alert('Error saving settings: ' + (data.message || ''));
                    }
                })
                .catch(error => {
                    console.log('Error saving settings:', error);
                    alert('Error saving settings');
                });
        }
    </script>
</body>

</html>
