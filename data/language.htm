<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Welcome | خوش آمدید</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Vazirmatn', system-ui, -apple-system, 'Roboto', Tahoma, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: linear-gradient(135deg, #1e2a3a 0%, #0f1724 100%);
            transition: background 0.2s ease;
        }

        .language-card {
            max-width: 440px;
            width: 100%;
            background: rgba(20, 28, 38, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        .welcome-section {
            padding: 2rem 2rem 1rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .welcome-title {
            font-size: 1.65rem;
            font-weight: 700;
            color: #333 !important;
            background: linear-gradient(135deg, #FFFFFF, #cfddee);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.9rem;
        }

        .welcome-sub {
            font-size: 0.85rem;
            color: #b9c2d4;
            margin-top: 0.3rem;
        }

        .languages-section {
            padding: 0.3rem 2rem 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .lang-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.9rem 0;
            font-size: 1.2rem;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            border: none;
            border-radius: 3rem;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transition: opacity 0.15s, transform 0.05s;
            letter-spacing: 0.5px;
        }

        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }

            .welcome-section {
                padding: 1.5rem 1.5rem 0.8rem 1.5rem;
            }

            .welcome-title {
                font-size: 1.6rem;
            }

            .languages-section {
                padding: 0.3rem 1.5rem 2rem 1.5rem;
                gap: 0.85rem;
            }

            .lang-btn {
                padding: 0.75rem 0;
                font-size: 1.1rem;
            }

            .lang-icon {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 380px) {
            .welcome-title {
                font-size: 1.5rem;
            }

            .lang-btn {
                font-size: 1rem;
                padding: 0.7rem 0;
            }
        }
    </style>
</head>

<body>

    <div class="language-card">
        <div class="welcome-section">
            <div class="welcome-title" style="padding-top: 10px;">Welcome</div>
            <div class="welcome-title">خوش آمدید</div>
        </div>
        <div class="languages-section">
            <a href="/fa/upload/" class="lang-btn">
                <span>فارسی 🇮🇷</span>
            </a>
            <a href="/en/upload/" class="lang-btn">
                <span>🇬🇧 English</span>
            </a>
            <a href="/ar/upload/" class="lang-btn">
                <span>العربية 🇸🇦</span>
            </a>
        </div>
    </div>

    <script>
        try {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/', false);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            xhr.send(null);

            if (xhr.status === 200) {
                const data = JSON.parse(xhr.responseText);
                if (data.pricolor && data.seccolor) {
                    document.body.style.background = `linear-gradient(135deg, ${data.pricolor} 0%, ${data.seccolor} 100%)`;
                }

                if (data.pricolor) {
                    const btns = document.querySelectorAll('.lang-btn');
                    btns.forEach(btn => {
                        btn.style.backgroundColor = data.pricolor;
                        btn.style.color = '#ffffff';
                        btn.style.background = data.pricolor;
                    });
                }

                if (data.bgcolor) {
                    const card = document.querySelector('.language-card');
                    card.style.backgroundColor = data.bgcolor;
                    card.style.backdropFilter = 'none';
                }

                if (data.navcolor) {
                    let meta = document.createElement('meta');
                    meta.name = "theme-color";
                    meta.content = data.navcolor;
                    document.head.appendChild(meta);
                }
            }
        } catch (error) {
            console.log("خطا در دریافت رنگ از API:", error);
        }
    </script>
</body>

</html>
