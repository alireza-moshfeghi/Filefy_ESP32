<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Vazirmatn', system-ui, -apple-system, 'Roboto', Tahoma, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: linear-gradient(135deg, #1e2a3a 0%, #0f1724 100%);
            transition: background 0.2s ease;
        }

        .admin-container {
            max-width: 440px;
            width: 100%;
            background: rgba(20, 28, 38, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        .box-section {
            padding: 2rem 2rem 1rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #cfddee);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .admin-section {
            padding: 0.3rem 2rem 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message-text {
            color: rgba(255, 255, 255, 0.85);
            font-size: 1rem;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 0.5rem;
        }

        .admin-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.9rem 0;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            border: none;
            border-radius: 3rem;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transition: opacity 0.15s, transform 0.05s;
            letter-spacing: 0.5px;
        }

        .admin-btn:hover {
            opacity: 0.85;
        }

        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }

            .box-section {
                padding: 1.5rem 1.5rem 0.8rem 1.5rem;
            }

            .admin-title {
                font-size: 1.6rem;
            }

            .admin-section {
                padding: 0.3rem 1.5rem 2rem 1.5rem;
                gap: 0.85rem;
            }

            .admin-btn {
                padding: 0.75rem 0;
                font-size: 1.1rem;
            }
        }

        @media (max-width: 380px) {
            .admin-title {
                font-size: 1.5rem;
            }

            .admin-btn {
                font-size: 1rem;
                padding: 0.7rem 0;
            }
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <div class="box-section">
            <div class="admin-title header-title" style="color: #333;">تسجيل الخروج</div>
        </div>
        <div class="admin-section">
            <p class="message-text message" style="color: #333;">هل أنت متأكد من تسجيل الخروج؟</p>
            <div class="btn-group">
                <a href="/ar/logout/?accept=true" class="admin-btn yes-btn">نعم</a>
                <a href="/ar/home/" class="admin-btn no-btn">لا</a>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const accept = urlParams.get('accept');
        
        if (accept === 'true') {
            var cookie = document.cookie;
            var token = cookie.split('; ').find(row => row.startsWith('token='));
            if (token) {
                token = token.split('=')[1];
                var formData = new URLSearchParams();
                formData.append('token', token);
                fetch('/ar/logout/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formData
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status == "ok") {
                            document.querySelector('.message').textContent = 'تم تسجيل خروجك بنجاح';
                            document.querySelector('.btn-group').style.display = 'none';
                            setTimeout(() => {
                                window.location.href = '/ar/login/';
                            }, 2000);
                        }
                    });
            }
        }
        
        fetch('/ar/logout/', {
            method: "POST",
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            }
        })
            .then(response => response.json())
            .then(data => {
                if (data.name) {
                    document.title = data.name + " | تسجيل الخروج";
                }
                
                if (data.pricolor && data.seccolor) {
                    document.body.style.background = `linear-gradient(135deg, ${data.pricolor} 0%, ${data.seccolor} 100%)`;
                    document.querySelectorAll('.admin-btn').forEach(btn => {
                        btn.style.backgroundColor = data.pricolor;
                        btn.style.background = data.pricolor;
                    });
                }
                
                if (data.bgcolor) {
                    let container = document.querySelector('.admin-container');
                    if (container) {
                        container.style.backgroundColor = data.bgcolor;
                        container.style.backdropFilter = 'none';
                    }
                }
                
                if (data.navcolor) {
                    let meta = document.createElement('meta');
                    meta.name = "theme-color";
                    meta.content = data.navcolor;
                    document.head.appendChild(meta);
                }
                
                if (data.fgcolor) {
                    document.querySelectorAll('.admin-btn').forEach(btn => {
                        btn.style.color = data.fgcolor;
                    });
                }
            })
            .catch(error => {
                console.error('خطأ في جلب البيانات:', error);
            });
    </script>
</body>

</html>
