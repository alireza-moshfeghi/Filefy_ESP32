<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Vazirmatn', system-ui, -apple-system, 'Roboto', Tahoma, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: linear-gradient(135deg, #1e2a3a 0%, #0f1724 100%);
            transition: background 0.2s ease;
        }

        .admin-container {
            max-width: 600px;
            width: 100%;
            background: rgba(20, 28, 38, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        .box-section {
            padding: 2rem 2rem 0rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #cfddee);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .admin-section {
            padding: 0.5rem 2rem 2rem 2rem;
        }

        .content-text {
            font-size: 1.1rem;
            line-height: 1.9;
            text-align: justify;
            letter-spacing: 0.3px;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 2rem;
            word-wrap: break-word;
        }

        .service-list {
            list-style: none;
            margin: 1.5rem 0;
            text-align: right;
        }

        .service-list li {
            padding: 0.5rem 0;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .service-list li::before {
            content: "✅";
            font-size: 1rem;
        }

        .commitment-box {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            text-align: right;
        }

        .commitment-box p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
            line-height: 1.7;
            margin: 0.5rem 0;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            margin-top: 1rem;
        }

        .admin-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.85rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            border: none;
            border-radius: 3rem;
            cursor: pointer;
            background: #4f46e5;
            color: white;
            transition: opacity 0.15s;
        }

        .admin-btn:hover {
            opacity: 0.85;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loading.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(20, 28, 38, 0.95);
            padding: 20px 32px;
            border-radius: 2rem;
            font-family: inherit;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }

            .box-section {
                padding: 1.5rem 1.5rem 0rem 1.5rem;
            }

            .admin-title {
                font-size: 1.5rem;
            }

            .admin-section {
                padding: 0rem 1.5rem 1.8rem 1.5rem;
            }

            .content-text {
                font-size: 1.1rem;
                line-height: 1.7;
            }

            .service-list li {
                font-size: 0.85rem;
            }

            .admin-btn {
                padding: 0.7rem 1.5rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div id="loading">
        <div class="loader-content">
            <div class="spinner"></div>
            <span>...جاري التحميل</span>
        </div>
    </div>

    <div class="admin-container">
        <div class="box-section">
            <div class="admin-title header-title" style="color: #333;">مَن نحن</div>
        </div>
        <div class="admin-section">
            <div class="content-text" style="color: #333;">
            </div>

            <div class="btn-group">
                <a href="/ar/upload/" class="admin-btn action-btn">العودة إلى القائمة</a>
            </div>
        </div>
    </div>

    <script>
        fetch('/ar/about/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            }
        })
            .then(response => response.json())
            .then(data => {
                if (data.name) {
                    document.title = data.name + " | مَن نحن";
                }

                if (data.pricolor && data.seccolor) {
                    document.body.style.background = `linear-gradient(135deg, ${data.pricolor} 0%, ${data.seccolor} 100%)`;
                    document.querySelector('.admin-btn').style.backgroundColor = data.pricolor;
                }

                if (data.bgcolor) {
                    let container = document.querySelector('.admin-container');
                    if (container) {
                        container.style.backgroundColor = data.bgcolor;
                        container.style.backdropFilter = 'none';
                    }
                }

                if (data.navcolor) {
                    let meta = document.createElement('meta');
                    meta.name = "theme-color";
                    meta.content = data.navcolor;
                    document.head.appendChild(meta);
                }
                if (data.fgcolor) {
                    document.querySelector('.admin-btn').style.color = data.fgcolor;
                }
                if (data.info) {
                    document.querySelector('.content-text').innerHTML = data.info;
                }

                setTimeout(hideLoading, 500);
            })
            .catch(error => {
                console.error('خطأ في جلب البيانات:', error);
                setTimeout(hideLoading, 500);
            });

        function hideLoading() {
            const loadingEl = document.getElementById('loading');
            if (loadingEl) {
                loadingEl.classList.add('fade-out');
            }
        }
    </script>
</body>

</html>
