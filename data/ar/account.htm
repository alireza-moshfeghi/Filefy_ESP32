<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Vazirmatn', system-ui, -apple-system, 'Roboto', Tahoma, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: linear-gradient(135deg, #1e2a3a 0%, #0f1724 100%);
            transition: background 0.2s ease;
        }

        .admin-container {
            max-width: 520px;
            width: 100%;
            background: rgba(20, 28, 38, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        .box-section {
            padding: 2rem 2rem 1rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #cfddee);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .admin-subtitle {
            font-size: 0.85rem;
            opacity: 0.8;
            color: rgba(255, 255, 255, 0.8);
        }

        .admin-section {
            padding: 1.5rem 2rem 2rem 2rem;
        }

        .form-section {
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            text-align: right;
            color: #e0e0e0;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: #f5f7fa;
            border: 2px solid #d1d5db;
            border-radius: 1rem;
            font-size: 0.95rem;
            font-family: inherit;
            color: #1f2937;
            direction: rtl;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4f46e5;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .admin-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            flex: 1;
            padding: 0.9rem 0;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            border: none;
            border-radius: 3rem;
            cursor: pointer;
            color: white;
            transition: opacity 0.15s;
        }

        .save-btn {
            background: #4f46e5;
        }

        .cancel-btn {
            background: #6b7280;
        }

        .admin-btn:hover {
            opacity: 0.85;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loading.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(20, 28, 38, 0.95);
            padding: 20px 32px;
            border-radius: 2rem;
            font-family: inherit;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }

            .box-section {
                padding: 1.5rem 1.5rem 0.8rem 1.5rem;
            }

            .admin-title {
                font-size: 1.5rem;
            }

            .admin-section {
                padding: 1.2rem 1.5rem 1.8rem 1.5rem;
            }

            .btn-group {
                flex-direction: column;
                gap: 0.75rem;
            }

            .admin-btn {
                padding: 0.75rem 0;
            }
        }
    </style>
</head>

<body>
    <div id="loading">
        <div class="loader-content">
            <div class="spinner"></div>
            <span>...جاري التحميل</span>
        </div>
    </div>

    <div class="admin-container" id="settingsContainer">
        <div class="box-section">
            <div class="admin-title header-title" style="color: #333;">إعدادات الحساب</div>
            <div class="admin-subtitle" style="color: gray;">قم بتغيير معلومات حسابك الشخصي</div>
        </div>
        <div class="admin-section">
            <form onsubmit="saveSettings(event)" id="settingsForm">
                <div class="form-section">
                    <div class="form-group">
                        <label style="color: #333;">اسم المستخدم:</label>
                        <input type="text" id="username" placeholder="أدخل اسم المستخدم الخاص بك">
                    </div>
                    <div class="form-group">
                        <label style="color: #333;">كلمة المرور الحالية:</label>
                        <input type="password" id="currentPassword" placeholder="أدخل كلمة المرور الحالية">
                    </div>
                    <div class="form-group">
                        <label style="color: #333;">كلمة المرور الجديدة:</label>
                        <input type="password" id="newPassword" placeholder="أدخل كلمة المرور الجديدة">
                    </div>
                    <div class="form-group">
                        <label style="color: #333;">تأكيد كلمة المرور الجديدة:</label>
                        <input type="password" id="confirmPassword" placeholder="أعد إدخال كلمة المرور الجديدة">
                    </div>
                </div>

                <div class="btn-group">
                    <button type="submit" class="admin-btn save-btn">حفظ الإعدادات</button>
                    <button type="button" class="admin-btn cancel-btn" onclick="window.location.href='/ar/home/'">رجوع</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        var cookie = document.cookie;
        var token = cookie.split('; ').find(row => row.startsWith('token='));
        if (token) {
            token = token.split('=')[1];
            var formData = new URLSearchParams();
            formData.append('token', token);
            fetch('/ar/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status == "invalid" || data.status == "user") {
                        window.location.href = '/ar/login/';
                    }
                });
        }
        else {
            window.location.href = '/ar/login/';
        }

        let currentSettings = {
            username: ''
        };

        function getToken() {
            var cookie = document.cookie;
            var token = cookie.split('; ').find(row => row.startsWith('token='));
            if (token) {
                return token.split('=')[1];
            }
            return null;
        }

        function hideLoading() {
            document.getElementById('loading').classList.add('fade-out');
        }

        var token = getToken();
        if (token) {
            var formData = new URLSearchParams();
            formData.append('token', token);
            fetch('/ar/account/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData.toString()
            })
                .then(response => response.json())
                .then(data => {
                    currentSettings = {
                        username: data.username || ''
                    };
                    
                    document.getElementById('username').value = currentSettings.username;

                    if (data.pricolor && data.seccolor) {
                        document.body.style.background = `linear-gradient(135deg, ${data.pricolor} 0%, ${data.seccolor} 100%)`;
                        document.querySelectorAll('.save-btn, .cancel-btn').forEach(btn => {
                            btn.style.backgroundColor = data.pricolor;
                        });
                    }

                    if (data.bgcolor) {
                        let container = document.querySelector('.admin-container');
                        if (container) {
                            container.style.backgroundColor = data.bgcolor;
                            container.style.backdropFilter = 'none';
                        }
                    }

                    if (data.navcolor) {
                        let meta = document.createElement('meta');
                        meta.name = "theme-color";
                        meta.content = data.navcolor;
                        document.head.appendChild(meta);
                    }

                    if (data.fgcolor) {
                        document.querySelectorAll('.admin-btn').forEach(btn => {
                            btn.style.color = data.fgcolor;
                        });
                    }

                    if (data.name) {
                        document.title = data.name + " | إعدادات الحساب";
                    }

                    setTimeout(hideLoading, 500);
                })
                .catch(error => {
                    console.log('خطأ في جلب البيانات:', error);
                    setTimeout(hideLoading, 500);
                });
        }

        function saveSettings(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            var token = getToken();
            var formData = new URLSearchParams();
            formData.append('token', token);
            formData.append('action', 'set');
            formData.append('username', username);
            formData.append('currentPassword', currentPassword);
            formData.append('newPassword', newPassword);
            formData.append('confirmPassword', confirmPassword);

            fetch('/ar/account/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData.toString()
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status == "username") {
                        alert("الرجاء إدخال اسم المستخدم.");
                    }
                    else if (data.status == "wrongUsername") {
                        alert("اسم المستخدم الذي أدخلته غير صحيح.");
                    }
                    else if (data.status == "currentPassword") {
                        alert("الرجاء إدخال كلمة المرور الحالية.");
                    }
                    else if (data.status == "newPassword") {
                        alert("الرجاء إدخال كلمة المرور الجديدة.");
                    }
                    else if (data.status == "confirmPassword") {
                        alert("الرجاء إدخال تأكيد كلمة المرور الجديدة.");
                    }
                    else if (data.status == "wrongPassword") {
                        alert("كلمة المرور التي أدخلتها غير صحيحة.");
                    }
                    else if (data.status == "noMatch") {
                        alert("كلمة المرور الجديدة لا تتطابق مع تأكيدها.");
                    }
                    else if (data.status == "shortPassword") {
                        alert("يجب أن تكون كلمة المرور أطول من ثمانية أحرف.");
                    }
                    else if (data.status == "ok") {
                        alert("تم تغيير كلمة المرور بنجاح.");
                        document.getElementById('currentPassword').value = '';
                        document.getElementById('newPassword').value = '';
                        document.getElementById('confirmPassword').value = '';
                        
                        if (data.navcolor) {
                            document.querySelectorAll('.save-btn, .cancel-btn').forEach(btn => {
                                btn.style.backgroundColor = data.navcolor;
                            });
                            let metaThemeColor = document.querySelector('meta[name="theme-color"]');
                            if (!metaThemeColor) {
                                metaThemeColor = document.createElement('meta');
                                metaThemeColor.name = "theme-color";
                                document.head.appendChild(metaThemeColor);
                            }
                            metaThemeColor.content = data.navcolor;
                        }
                    }
                })
                .catch(error => {
                    console.log('خطأ في حفظ الإعدادات:', error);
                    alert('خطأ في حفظ الإعدادات');
                });
        }
    </script>
</body>

</html>
