<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', Tahoma, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: linear-gradient(135deg, #1e2a3a 0%, #0f1724 100%);
            transition: background 0.2s ease;
        }

        .admin-container {
            max-width: 800px;
            width: 100%;
            background: rgba(20, 28, 38, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        .box-section {
            padding: 1.5rem 1.5rem 1rem 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #cfddee);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .admin-subtitle {
            font-size: 0.8rem;
            opacity: 0.7;
            color: rgba(255, 255, 255, 0.7);
        }

        .admin-section {
            padding: 1.2rem 1.5rem 1.8rem 1.5rem;
        }

        .add-btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 1rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            transition: opacity 0.15s;
        }

        .add-btn:hover {
            opacity: 0.85;
        }

        .files-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-height: 450px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
            padding: 0.9rem;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
            transition: all 0.2s;
        }

        .file-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            flex: 2;
            min-width: 0;
        }

        .file-name {
            font-weight: 600;
            font-size: 1rem;
            word-wrap: break-word;
            word-break: break-word;
            overflow-wrap: break-word;
            line-height: 1.4;
        }

        .file-code {
            font-size: 1rem;
            text-align: right;
            word-wrap: break-word;
            word-break: break-all;
        }

        .file-actions {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .delete-btn {
            padding: 0.45rem 0.9rem;
            border: none;
            border-radius: 0.7rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            transition: opacity 0.15s;
            background: #ef4444;
            color: white;
        }

        .delete-btn:hover {
            opacity: 0.8;
        }

        .empty-list {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 2rem;
            font-size: 0.9rem;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 1.5rem;
            max-width: 500px;
            width: 90%;
            padding: 1.5rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            border: none;
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            text-align: center;
            color: #1f2937;
        }

        .upload-modal .modal-content {
            background: white;
        }

        .upload-modal .modal-title {
            color: #1f2937;
        }

        .file-input-area {
            background: #f3f4f6;
            border: 2px dashed #d1d5db;
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }

        .file-input-area input {
            display: none;
        }

        .file-input-label {
            color: #6b7280;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .selected-file {
            background: #f3f4f6;
            padding: 0.7rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            color: #1f2937;
            font-size: 0.85rem;
            text-align: center;
            word-break: break-word;
        }

        .progress-container {
            margin-bottom: 1rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #10b981, #059669);
            transition: width 0.3s;
            border-radius: 4px;
        }

        .progress-text {
            text-align: center;
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 0.5rem;
        }

        .modal-buttons {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.2rem;
        }

        .modal-btn {
            flex: 1;
            padding: 0.7rem;
            border: none;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
            font-size: 0.9rem;
        }

        .modal-btn:hover {
            opacity: 0.85;
        }

        .send-btn {
            background: #10b981;
            color: white;
        }

        .cancel-btn {
            background: #e5e7eb;
            color: #4b5563;
        }

        .result-code {
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            font-family: monospace;
            background: #ecfdf5;
            padding: 0.7rem;
            border-radius: 0.75rem;
            margin-top: 1rem;
            color: #10b981;
            direction: ltr;
            word-break: break-word;
        }

        .delete-modal .modal-content {
            background: white;
            text-align: center;
        }

        .delete-message {
            color: #4b5563;
            margin-bottom: 1.2rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .delete-warning {
            color: #ef4444;
            font-weight: bold;
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }

        .delete-btn-modal {
            background: #ef4444;
            color: white;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #loading.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 15px 25px;
            border-radius: 2rem;
            font-family: inherit;
            font-size: 16px;
            color: #1f2937;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid #e5e7eb;
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 550px) {
            body {
                padding: 0.75rem;
            }

            .box-section {
                padding: 1.2rem 1.2rem 0.8rem 1.2rem;
            }

            .admin-title {
                font-size: 1.3rem;
            }

            .admin-subtitle {
                font-size: 0.7rem;
            }

            .admin-section {
                padding: 1rem 1.2rem 1.5rem 1.2rem;
            }

            .add-btn {
                padding: 0.8rem;
                font-size: 0.9rem;
            }

            .file-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.6rem;
                padding: 0.75rem;
            }

            .file-info {
                width: 100%;
            }

            .file-name {
                font-size: 0.9rem;
            }

            .file-code {
                font-size: 0.7rem;
                text-align: left;
            }

            .file-actions {
                width: 100%;
                justify-content: flex-end;
            }

            .delete-btn {
                padding: 0.4rem 0.8rem;
                font-size: 0.7rem;
            }

            .modal-content {
                padding: 1.2rem;
                width: 92%;
            }

            .modal-title {
                font-size: 1.2rem;
                margin-bottom: 1rem;
            }

            .file-input-area {
                padding: 1.2rem;
            }

            .file-input-label {
                font-size: 0.85rem;
            }

            .modal-btn {
                padding: 0.6rem;
                font-size: 0.85rem;
            }

            .result-code {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 380px) {
            .admin-title {
                font-size: 1.2rem;
            }

            .file-name {
                font-size: 0.85rem;
            }

            .delete-btn {
                padding: 0.35rem 0.7rem;
                font-size: 0.65rem;
            }
        }
    </style>
</head>

<body>
    <div id="loading">
        <div class="loader-content">
            <div class="spinner"></div>
            <span>جاري التحميل...</span>
        </div>
    </div>

    <div class="admin-container">
        <div class="box-section">
            <div class="admin-title header-title" style="color: #333;">إدارة الملفات</div>
            <div class="admin-subtitle" style="color: gray;">رفع الملفات وعرضها وإدارتها</div>
        </div>
        <div class="admin-section">
            <button class="add-btn" id="openModalBtn">
                إضافة ملف جديد
            </button>

            <div class="files-list" id="filesList">
                <div class="empty-list" style="color: #333;">لم يتم العثور على ملفات.</div>
            </div>
        </div>
    </div>

    <div id="uploadModal" class="modal upload-modal">
        <div class="modal-content">
            <div class="modal-title">رفع ملف</div>
            <div class="file-input-area" id="fileInputArea">
                <input type="file" id="fileInput">
                <div class="file-input-label">
                    📂 انقر أو اسحب وأفلت الملف
                </div>
            </div>
            <div id="selectedFileName" class="selected-file" style="display: none;"></div>
            <div class="progress-container" id="progressContainer" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">0%</div>
            </div>
            <div id="resultCode" class="result-code" style="display: none;"></div>
            <div class="modal-buttons">
                <button class="modal-btn send-btn" id="sendFileBtn">إرسال الملف</button>
                <button class="modal-btn cancel-btn" id="closeModalBtn">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="modal delete-modal">
        <div class="modal-content">
            <div class="modal-title">حذف الملف</div>
            <div class="delete-message">
                هل أنت متأكد من حذف هذا الملف؟
            </div>
            <div class="modal-buttons">
                <button class="modal-btn delete-btn-modal" id="confirmDeleteBtn">حذف</button>
                <button class="modal-btn cancel-btn" id="closeDeleteModalBtn">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        let host = '';
        var cookie = document.cookie;
        var token = cookie.split('; ').find(row => row.startsWith('token='));
        if (token) {
            token = token.split('=')[1];
            var formData = new URLSearchParams();
            formData.append('token', token);
            fetch('/ar/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status == "invalid" || data.status == "user") {
                        window.location.href = '/ar/login/';
                    }
                });
        }
        else {
            window.location.href = '/ar/login/';
        }
        
        var selectedFile = null;
        var filesList = [];
        var currentDeleteId = null;
        var currentDeleteCode = null;

        function getToken() {
            var cookie = document.cookie;
            var tokenCookie = cookie.split('; ').find(function (row) { return row.startsWith('token='); });
            if (tokenCookie) {
                return tokenCookie.split('=')[1];
            }
            return null;
        }

        function generateRandomCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        function fetchFilesAndColors() {
            var token = getToken();
            if (!token) {
                setTimeout(hideLoading, 500);
                return;
            }

            var formData = new URLSearchParams();
            formData.append('token', token);

            fetch('/ar/files/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData.toString()
            })
                .then(function (response) { return response.json(); })
                .then(function (data) {
                    if (data.pricolor && data.seccolor) {
                        document.body.style.background = 'linear-gradient(135deg, ' + data.pricolor + ' 0%, ' + data.seccolor + ' 100%)';
                        document.querySelector('.add-btn').style.background = data.pricolor;
                        document.querySelectorAll('.modal-btn').forEach(btn => {
                            btn.style.backgroundColor = data.pricolor;
                        });
                    }
                    if (data.bgcolor) {
                        document.querySelector('.admin-container').style.backgroundColor = data.bgcolor;
                        document.querySelector('.admin-container').style.backdropFilter = 'none';
                    }
                    if (data.navcolor) {
                        var meta = document.createElement('meta');
                        meta.name = "theme-color";
                        meta.content = data.navcolor;
                        document.head.appendChild(meta);
                    }
                    if (data.fgcolor) {
                        document.querySelectorAll('.modal-btn').forEach(btn => {
                            btn.style.color = data.fgcolor;
                        });
                    }
                    if (data.name) {
                        document.title = data.name + " | إدارة الملفات";
                    }
                    if (data.host) {
                        host = data.host;
                    }
                    if (data.files && Array.isArray(data.files)) {
                        filesList = data.files;
                        renderFilesList();
                    }
                    setTimeout(hideLoading, 500);
                })
                .catch(function (error) {
                    console.error('خطأ في جلب البيانات:', error);
                    setTimeout(hideLoading, 500);
                });
        }

        function renderFilesList() {
            var container = document.getElementById('filesList');
            if (!filesList.length) {
                container.innerHTML = '<div class="empty-list" style="color: #000000;">📭 لا توجد ملفات</div>';
                return;
            }

            var html = '';
            for (var i = 0; i < filesList.length; i++) {
                var file = filesList[i];
                html += '<div class="file-item" data-id="' + file.id + '" data-code="' + file.code + '">';
                html += '<div class="file-info">';
                html += '<div class="file-name" style="color: #000000;">📄 ' + escapeHtml(file.name) + '</div>';
                html += '<div class="file-code" style="color: #000000;">🔑 رمز التحميل: ' + file.code + '</div>';
                html += '</div>';
                html += '<div class="file-actions">';
                html += '<button class="delete-btn" onclick="openDeleteModal(\'' + file.id + '\', \'' + file.code + '\')">🗑️ حذف</button>';
                html += '</div></div>';
            }
            container.innerHTML = html;
        }

        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function openDeleteModal(id, code) {
            currentDeleteId = id;
            currentDeleteCode = code;
            document.getElementById('deleteModal').classList.add('show');
        }

        function confirmDelete() {
            if (currentDeleteId && currentDeleteCode) {
                var token = getToken();
                var formData = new URLSearchParams();
                formData.append('token', token);
                formData.append('action', 'delete');
                formData.append('code', currentDeleteCode);

                fetch('/ar/files/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formData.toString()
                })
                    .then(function (response) { return response.json(); })
                    .then(function (data) {
                        if (data.status == "ok") {
                            filesList = filesList.filter(function (c) { return c.id != currentDeleteId; });
                            renderFilesList();
                            closeDeleteModal();
                        } else {
                            alert('❌ خطأ في حذف الملف');
                        }
                    })
                    .catch(function (error) {
                        alert('❌ خطأ في حذف الملف');
                    });
            }
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('show');
            currentDeleteId = null;
            currentDeleteCode = null;
        }

        function resetModal() {
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('resultCode').style.display = 'none';
            selectedFile = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('selectedFileName').style.display = 'none';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = '0%';
            document.getElementById('sendFileBtn').disabled = false;
            document.getElementById('sendFileBtn').textContent = 'إرسال الملف';
        }

        function closeModal() {
            document.getElementById('uploadModal').classList.remove('show');
            resetModal();
        }

        function openModal() {
            resetModal();
            document.getElementById('uploadModal').classList.add('show');
        }

        function hideLoading() {
            var loadingEl = document.getElementById('loading');
            if (loadingEl) {
                loadingEl.classList.add('fade-out');
            }
        }

        document.getElementById('openModalBtn').addEventListener('click', openModal);
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        document.getElementById('closeDeleteModalBtn').addEventListener('click', closeDeleteModal);
        document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDelete);

        document.getElementById('fileInputArea').addEventListener('click', function () {
            document.getElementById('fileInput').click();
        });

        document.getElementById('fileInput').addEventListener('change', function (e) {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                document.getElementById('selectedFileName').textContent = '📎 ' + selectedFile.name;
                document.getElementById('selectedFileName').style.display = 'block';
            }
        });

        document.getElementById('sendFileBtn').addEventListener('click', function () {
            if (!selectedFile) {
                alert('❌ الرجاء اختيار ملف أولاً');
                return;
            }

            var generatedCode = generateRandomCode();
            var progressContainer = document.getElementById('progressContainer');
            var progressFill = document.getElementById('progressFill');
            var progressText = document.getElementById('progressText');
            var sendBtn = document.getElementById('sendFileBtn');

            progressContainer.style.display = 'block';
            sendBtn.disabled = true;
            sendBtn.textContent = 'جاري الرفع...';

            var formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('code', generatedCode);

            var xhr = new XMLHttpRequest();

            xhr.upload.addEventListener('progress', function (e) {
                if (e.lengthComputable) {
                    var percent = Math.round((e.loaded / e.total) * 100);
                    progressFill.style.width = percent + '%';
                    progressText.textContent = percent + '%';
                }
            });

            xhr.onreadystatechange = function () {
                if (xhr.readyState == XMLHttpRequest.DONE) {
                    if (xhr.status == 200) {
                        try {
                            var response = JSON.parse(xhr.responseText);
                            if (response.status == "ok") {
                                var token = getToken();
                                var formData2 = new URLSearchParams();
                                formData2.append('token', token);
                                formData2.append('action', 'add');
                                formData2.append('code', generatedCode);
                                formData2.append('name', selectedFile.name);

                                fetch('/ar/files/', {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/x-www-form-urlencoded'
                                    },
                                    body: formData2.toString()
                                })
                                .then(function(res) { return res.json(); })
                                .then(function(data) {
                                    if (data.status == "ok") {
                                        document.getElementById('resultCode').style.display = 'block';
                                        document.getElementById('resultCode').innerHTML = '✅ رمز تحميل ملفك: <strong>' + generatedCode + '</strong>';
                                        fetchFilesAndColors();
                                    } else if (data.status == "exists") {
                                        alert('❌ ملف بهذا الرمز موجود بالفعل');
                                        resetModal();
                                    } else {
                                        alert('❌ خطأ في حفظ البيانات');
                                        resetModal();
                                    }
                                    sendBtn.disabled = false;
                                    sendBtn.textContent = 'إرسال الملف';
                                })
                                .catch(function(error) {
                                    alert('❌ خطأ في حفظ البيانات');
                                    resetModal();
                                    sendBtn.disabled = false;
                                    sendBtn.textContent = 'إرسال الملف';
                                });
                            } else {
                                alert('❌ خطأ في رفع الملف');
                                resetModal();
                                sendBtn.disabled = false;
                                sendBtn.textContent = 'إرسال الملف';
                            }
                        } catch(e) {
                            alert('❌ خطأ في استلام الرد من الخادم');
                            resetModal();
                            sendBtn.disabled = false;
                            sendBtn.textContent = 'إرسال الملف';
                        }
                    } else {
                        alert('❌ خطأ في رفع الملف إلى الخادم (رمز الخطأ: ' + xhr.status + ')');
                        resetModal();
                        sendBtn.disabled = false;
                        sendBtn.textContent = 'إرسال الملف';
                    }
                }
            };

            xhr.open('POST', 'http://' + host + '/download.php', true);
            xhr.send(formData);
        });

        var modals = document.querySelectorAll('.modal');
        for (var i = 0; i < modals.length; i++) {
            modals[i].addEventListener('click', function (e) {
                if (e.target === this) {
                    this.classList.remove('show');
                    if (this.id === 'uploadModal') resetModal();
                }
            });
        }

        var dropZone = document.getElementById('fileInputArea');
        dropZone.addEventListener('dragover', function (e) {
            e.preventDefault();
            dropZone.style.borderColor = '#10b981';
            dropZone.style.background = '#ecfdf5';
        });
        dropZone.addEventListener('dragleave', function (e) {
            e.preventDefault();
            dropZone.style.borderColor = '#d1d5db';
            dropZone.style.background = '#f3f4f6';
        });
        dropZone.addEventListener('drop', function (e) {
            e.preventDefault();
            dropZone.style.borderColor = '#d1d5db';
            dropZone.style.background = '#f3f4f6';
            if (e.dataTransfer.files.length > 0) {
                selectedFile = e.dataTransfer.files[0];
                document.getElementById('selectedFileName').textContent = '📎 ' + selectedFile.name;
                document.getElementById('selectedFileName').style.display = 'block';
            }
        });

        fetchFilesAndColors();
    </script>
</body>

</html>
